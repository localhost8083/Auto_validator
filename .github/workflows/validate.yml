name: Validate M3U playlists

on:
  schedule:
    # Every 3 hours (UTC). Change to "0 */2 * * *" for every 2 hours.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "sources.txt"
      - "validator.py"
      - "checker.py"
      - "m3u.py"
      - ".github/workflows/validate.yml"

# Allow the workflow to push the refreshed outputs back to the repo.
permissions:
  contents: write

concurrency:
  group: validate-m3u
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run validator
        env:
          CONCURRENCY: "20"
          TEST_WORKERS: "8"
          DEAD_TIMEOUT: "9000"
          TEST_TIMEOUT: "12000"
          DEEP_TEST: "1"
        run: python validator.py

      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh validated playlists ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
